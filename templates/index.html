<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Memoir</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #060504;
      --surface: #0e0b08;
      --card:    #151109;
      --border:  #201a10;
      --text:    #e8dfc8;
      --dim:     #6a5a40;
      --amber:   #c8973a;
      --warm:    #b87d48;
      --muted:   #281f12;
      --red:     #b03020;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lora', Georgia, serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── FILM GRAIN ── */
    body::before {
      content: '';
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
      opacity: 0.55;
      pointer-events: none;
      z-index: 0;
      animation: grain 0.15s steps(1) infinite;
    }
    @keyframes grain {
      0%   { transform: translate(0,0); }
      10%  { transform: translate(-2%,-3%); }
      20%  { transform: translate(3%,1%); }
      30%  { transform: translate(-1%,4%); }
      40%  { transform: translate(4%,-1%); }
      50%  { transform: translate(-3%,2%); }
      60%  { transform: translate(2%,-4%); }
      70%  { transform: translate(-4%,3%); }
      80%  { transform: translate(1%,-2%); }
      90%  { transform: translate(3%,4%); }
      100% { transform: translate(-2%,1%); }
    }

    /* ── SPOTLIGHT from above — single amber cone ── */
    .spotlight {
      position: fixed;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 320px;
      height: 100vh;
      background: radial-gradient(ellipse 160px 70% at 50% 0%,
        rgba(200,151,58,0.13) 0%,
        rgba(200,151,58,0.06) 35%,
        transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    /* ── HEAVY VIGNETTE — dark room ── */
    .vignette {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 45%, transparent 0%, rgba(0,0,0,0.82) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* ── SMOKE ── */
    .smoke-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }
    .smoke-particle {
      position: absolute;
      bottom: 30%;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(210,190,150,0.06), transparent 70%);
      animation: smoke-drift linear infinite;
    }
    @keyframes smoke-drift {
      0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
      10%  { opacity: 1; }
      85%  { opacity: 0.5; }
      100% { transform: translateY(-60vh) translateX(var(--drift)) scale(2.5); opacity: 0; }
    }

    /* ── WORDMARK ── */
    .wordmark {
      position: fixed;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      text-align: center;
    }
    .wordmark-title {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--dim);
    }

    /* ── GUIDED PROMPT ── */
    .prompt-strip {
      position: fixed;
      top: 64px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      text-align: center;
      max-width: 420px;
      padding: 0 24px;
      display: none;
    }
    .prompt-strip.visible { display: block; }
    .prompt-strip-text {
      font-size: 14px;
      font-style: italic;
      color: rgba(232,224,208,0.5);
      line-height: 1.6;
    }
    .prompt-strip-next {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      background: transparent;
      border: none;
      cursor: pointer;
      margin-top: 8px;
      padding: 4px 0;
      transition: color 0.2s;
    }
    .prompt-strip-next:hover { color: var(--amber); }

    /* ── MAIN STAGE ── */
    .stage {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }

    /* ── VINTAGE MIC SVG ── */
    .mic-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Ambient glow behind the mic when recording */
    .mic-glow {
      position: absolute;
      width: 260px;
      height: 340px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(212,168,85,0) 0%, rgba(212,168,85,0) 100%);
      transition: background 0.6s ease;
      pointer-events: none;
    }
    .mic-glow.listening {
      background: radial-gradient(ellipse at center, rgba(212,168,85,0.08) 0%, rgba(212,168,85,0) 70%);
    }

    .vintage-mic {
      width: 160px;
      height: 260px;
      position: relative;
      z-index: 2;
      transition: filter 0.4s ease;
    }
    .vintage-mic.listening {
      filter: drop-shadow(0 0 28px rgba(212,168,85,0.45)) drop-shadow(0 0 60px rgba(212,168,85,0.15));
    }
    .vintage-mic.processing {
      filter: drop-shadow(0 0 10px rgba(212,168,85,0.15));
      opacity: 0.7;
    }

    /* ── REC + STATUS ── */
    .rec-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
      min-height: 20px;
    }
    .rec-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      opacity: 0;
      transition: opacity 0.2s;
      box-shadow: 0 0 8px rgba(192,57,43,0.6);
    }
    .rec-dot.visible {
      opacity: 1;
      animation: blink 1s ease-in-out infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .mic-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--dim);
      text-transform: uppercase;
      transition: color 0.3s;
    }
    .mic-status.listening { color: var(--amber); }

    /* ── VU METER ── */
    .vu-meter {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 32px;
      margin-top: 16px;
    }
    .vu-bar {
      width: 6px;
      background: var(--amber);
      border-radius: 2px 2px 0 0;
      opacity: 0.15;
      min-height: 3px;
      transition: height 0.07s ease, opacity 0.3s;
    }
    .vu-bar.active { opacity: 0.8; }

    /* ── BOTTOM CONTROLS ── */
    .controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 20px 40px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to top, rgba(10,9,6,0.95) 0%, rgba(10,9,6,0) 100%);
    }

    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .ctrl-btn {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
      background: transparent;
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .ctrl-btn:hover { border-color: var(--amber); color: var(--amber); }
    .ctrl-btn.active { border-color: rgba(212,168,85,0.4); color: var(--amber); background: rgba(212,168,85,0.06); }

    .ctrl-btn-primary {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--amber);
      background: rgba(212,168,85,0.08);
      border: 1px solid rgba(212,168,85,0.25);
      padding: 8px 18px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .ctrl-btn-primary:hover { background: rgba(212,168,85,0.15); border-color: rgba(212,168,85,0.5); }
    .ctrl-btn-primary:disabled { opacity: 0.35; cursor: default; }

    .entry-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 0.1em;
    }

    /* ── DRAWERS ── */
    .drawer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      max-height: 70vh;
      display: flex;
      flex-direction: column;
    }
    .drawer.open { transform: translateY(0); }

    .drawer-handle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .drawer-title {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dim);
    }
    .drawer-close {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: var(--dim);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      letter-spacing: 0.08em;
      transition: color 0.2s;
    }
    .drawer-close:hover { color: var(--amber); }

    .drawer-body {
      overflow-y: auto;
      padding: 20px 28px 32px;
      flex: 1;
    }

    /* Transcript in drawer */
    .transcript-text {
      font-size: 16px;
      font-style: italic;
      line-height: 1.8;
      color: var(--text);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }
    .transcript-text.empty {
      font-style: normal;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--dim);
    }

    /* Voice log in drawer */
    .voice-log { display: flex; flex-direction: column; gap: 12px; }
    .log-entry {
      border-left: 2px solid var(--muted);
      padding: 10px 16px;
      background: var(--card);
      border-radius: 0 8px 8px 0;
      transition: border-color 0.2s;
    }
    .log-entry:hover { border-left-color: var(--amber); }
    .log-time {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      color: var(--dim);
      margin-bottom: 6px;
      letter-spacing: 0.06em;
    }
    .log-text { font-size: 14px; line-height: 1.65; color: rgba(232,224,208,0.85); }

    /* Memoir chapters in drawer */
    .memoir-chapter {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .chapter-header {
      background: var(--surface);
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--warm);
    }
    .chapter-body {
      padding: 28px 32px;
      font-size: 15px;
      line-height: 1.85;
      color: var(--text);
      white-space: pre-wrap;
    }
    .empty-chapters {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--dim);
      text-align: center;
      padding: 40px 20px;
      line-height: 1.8;
    }
    .empty-chapters span { color: var(--amber); }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(212,168,85,0.2);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 19;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }
    .overlay.visible { opacity: 1; pointer-events: all; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }
  </style>
</head>
<body>

<!-- Spotlight cone -->
<div class="spotlight"></div>
<!-- Vignette dark room -->
<div class="vignette"></div>
<!-- Smoke particles -->
<div class="smoke-layer" id="smoke-layer"></div>

<!-- Wordmark -->
<div class="wordmark">
  <div class="wordmark-title">Memoir</div>
</div>

<!-- Guided prompt strip -->
<div class="prompt-strip" id="prompt-strip">
  <div class="prompt-strip-text" id="prompt-text">Tell me about where you grew up.</div>
  <button class="prompt-strip-next" onclick="nextPrompt()">next prompt →</button>
</div>

<!-- Main stage — click anywhere to record -->
<div class="stage" onclick="handleMic()">
  <div class="mic-wrap">
    <div class="mic-glow" id="mic-glow"></div>

    <!-- Detailed vintage condenser mic SVG -->
    <svg class="vintage-mic" id="vintage-mic" viewBox="0 0 160 260" fill="none" xmlns="http://www.w3.org/2000/svg">

      <defs>
        <!-- Chrome body gradient — light from left, like a single tungsten bulb -->
        <linearGradient id="chrome-body" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#0e0c0a"/>
          <stop offset="15%"  stop-color="#222018"/>
          <stop offset="32%"  stop-color="#3c3830"/>
          <stop offset="48%"  stop-color="#504c44"/>
          <stop offset="55%"  stop-color="#5a5650"/>
          <stop offset="68%"  stop-color="#3a3630"/>
          <stop offset="84%"  stop-color="#1e1c18"/>
          <stop offset="100%" stop-color="#0c0a08"/>
        </linearGradient>
        <linearGradient id="chrome-collar" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#0c0a08"/>
          <stop offset="35%"  stop-color="#2e2c28"/>
          <stop offset="55%"  stop-color="#2e2c28"/>
          <stop offset="100%" stop-color="#0c0a08"/>
        </linearGradient>
        <!-- Amber spotlight hitting the capsule from top -->
        <radialGradient id="capsule-light" cx="50%" cy="30%" r="60%">
          <stop offset="0%"   stop-color="rgba(200,151,58,0.18)"/>
          <stop offset="100%" stop-color="rgba(200,151,58,0)"/>
        </radialGradient>
      </defs>

      <!-- Stand base weighted plate -->
      <ellipse cx="80" cy="254" rx="34" ry="5" fill="#0e0c0a"/>
      <rect x="52" y="248" width="56" height="8" rx="4" fill="#181614"/>
      <rect x="58" y="245" width="44" height="5" rx="2.5" fill="#141210"/>
      <!-- Stand column -->
      <rect x="77" y="210" width="6" height="38" rx="3" fill="url(#chrome-collar)"/>
      <!-- Boom arm — angled like a real mic stand -->
      <line x1="80" y1="212" x2="106" y2="200" stroke="#1c1a16" stroke-width="4" stroke-linecap="round"/>
      <line x1="80" y1="212" x2="54"  y2="200" stroke="#1c1a16" stroke-width="4" stroke-linecap="round"/>
      <line x1="80" y1="212" x2="106" y2="200" stroke="#2e2c28" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="80" y1="212" x2="54"  y2="200" stroke="#2e2c28" stroke-width="1.5" stroke-linecap="round"/>

      <!-- Shock mount outer ring -->
      <circle cx="80" cy="198" r="17" stroke="#1e1c18" stroke-width="2.5" fill="none"/>
      <circle cx="80" cy="198" r="17" stroke="#302e28" stroke-width="0.8" fill="none"/>
      <!-- Spider elastic threads -->
      <line x1="80" y1="181" x2="80" y2="175" stroke="#242018" stroke-width="1.2" opacity="0.9"/>
      <line x1="90" y1="183" x2="94" y2="178" stroke="#242018" stroke-width="1.2" opacity="0.9"/>
      <line x1="70" y1="183" x2="66" y2="178" stroke="#242018" stroke-width="1.2" opacity="0.9"/>
      <line x1="80" y1="215" x2="80" y2="221" stroke="#242018" stroke-width="1.2" opacity="0.9"/>
      <line x1="90" y1="213" x2="94" y2="218" stroke="#242018" stroke-width="1.2" opacity="0.9"/>
      <line x1="70" y1="213" x2="66" y2="218" stroke="#242018" stroke-width="1.2" opacity="0.9"/>
      <!-- Shock mount center ring -->
      <circle cx="80" cy="198" r="9" stroke="#2a2820" stroke-width="1.5" fill="#0e0c08"/>

      <!-- Neck / body connector -->
      <rect x="70" y="174" width="20" height="26" rx="7" fill="#181614" stroke="#242018" stroke-width="1"/>
      <line x1="72" y1="181" x2="88" y2="181" stroke="#202018" stroke-width="0.7" opacity="0.8"/>
      <line x1="71" y1="186" x2="89" y2="186" stroke="#202018" stroke-width="0.7" opacity="0.8"/>
      <line x1="72" y1="191" x2="88" y2="191" stroke="#202018" stroke-width="0.7" opacity="0.8"/>

      <!-- Main cylindrical body — chrome silver -->
      <rect x="42" y="26" width="76" height="150" rx="38" fill="url(#chrome-body)"/>
      <rect x="42" y="26" width="76" height="150" rx="38" stroke="#302e28" stroke-width="1"/>

      <!-- Inner dark mesh window -->
      <rect x="49" y="36" width="62" height="130" rx="31" fill="#080706"/>
      <rect x="49" y="36" width="62" height="130" rx="31" stroke="#1a1816" stroke-width="0.8"/>

      <!-- Amber spotlight wash on capsule -->
      <rect x="49" y="36" width="62" height="130" rx="31" fill="url(#capsule-light)"/>

      <!-- Tight horizontal mesh bars -->
      <line x1="51" y1="50"  x2="109" y2="50"  stroke="#1e1c18" stroke-width="0.7" opacity="0.95"/>
      <line x1="50" y1="60"  x2="110" y2="60"  stroke="#1e1c18" stroke-width="0.7" opacity="0.95"/>
      <line x1="49" y1="70"  x2="111" y2="70"  stroke="#1e1c18" stroke-width="0.7" opacity="0.95"/>
      <line x1="49" y1="80"  x2="111" y2="80"  stroke="#1e1c18" stroke-width="0.7" opacity="0.95"/>
      <line x1="49" y1="90"  x2="111" y2="90"  stroke="#1e1c18" stroke-width="0.7" opacity="0.95"/>
      <line x1="49" y1="100" x2="111" y2="100" stroke="#1e1c18" stroke-width="0.7" opacity="0.95"/>
      <line x1="49" y1="110" x2="111" y2="110" stroke="#1e1c18" stroke-width="0.7" opacity="0.95"/>
      <line x1="49" y1="120" x2="111" y2="120" stroke="#1e1c18" stroke-width="0.7" opacity="0.95"/>
      <line x1="49" y1="130" x2="111" y2="130" stroke="#1e1c18" stroke-width="0.7" opacity="0.95"/>
      <line x1="49" y1="140" x2="111" y2="140" stroke="#1e1c18" stroke-width="0.7" opacity="0.95"/>
      <line x1="50" y1="150" x2="110" y2="150" stroke="#1e1c18" stroke-width="0.7" opacity="0.95"/>
      <line x1="51" y1="158" x2="109" y2="158" stroke="#1e1c18" stroke-width="0.7" opacity="0.95"/>

      <!-- Vertical mesh bars -->
      <line x1="62"  y1="34" x2="62"  y2="165" stroke="#181614" stroke-width="0.6" opacity="0.7"/>
      <line x1="72"  y1="31" x2="72"  y2="168" stroke="#181614" stroke-width="0.6" opacity="0.7"/>
      <line x1="80"  y1="30" x2="80"  y2="169" stroke="#181614" stroke-width="0.6" opacity="0.7"/>
      <line x1="88"  y1="31" x2="88"  y2="168" stroke="#181614" stroke-width="0.6" opacity="0.7"/>
      <line x1="98"  y1="34" x2="98"  y2="165" stroke="#181614" stroke-width="0.6" opacity="0.7"/>

      <!-- Capsule — the heart of the mic, glows amber -->
      <ellipse cx="80" cy="103" rx="18" ry="28" fill="rgba(200,151,58,0.04)" id="capsule-glow"/>
      <circle cx="80" cy="103" r="5" fill="#c8973a" opacity="0.18" id="capsule-dot"/>
      <circle cx="80" cy="103" r="2" fill="#c8973a" opacity="0.55"/>
      <circle cx="80" cy="103" r="0.8" fill="#e8b84a" opacity="0.9"/>

      <!-- Body label badge -->
      <rect x="62" y="162" width="36" height="10" rx="5" fill="#101008"/>
      <text x="80" y="170" text-anchor="middle" font-family="Inter,sans-serif" font-size="4.5" font-weight="700" letter-spacing="2.5" fill="#2a2820">MEMOIR</text>

      <!-- Top crown — dome shape -->
      <rect x="50" y="20" width="60" height="10" rx="5" fill="url(#chrome-collar)" stroke="#242018" stroke-width="0.8"/>
      <rect x="58" y="14" width="44" height="9"  rx="4.5" fill="#181614"/>
      <rect x="66" y="9"  width="28" height="8"  rx="4"   fill="#141210"/>
      <rect x="73" y="5"  width="14" height="7"  rx="3.5" fill="#0e0c08"/>
      <rect x="78" y="1"  width="4"  height="6"  rx="2"   fill="#0a0806"/>

      <!-- Body collar bottom -->
      <rect x="48" y="162" width="64" height="14" rx="7" fill="url(#chrome-collar)" stroke="#242018" stroke-width="0.8"/>
      <line x1="53" y1="167" x2="107" y2="167" stroke="#0e0c08" stroke-width="0.6" opacity="0.7"/>
      <line x1="55" y1="172" x2="105" y2="172" stroke="#0e0c08" stroke-width="0.6" opacity="0.7"/>

      <!-- Chrome highlight specular — left edge catch from tungsten light -->
      <rect x="43" y="40" width="3" height="100" rx="1.5" fill="rgba(255,240,200,0.04)"/>
      <rect x="44" y="55" width="1.5" height="70" rx="0.75" fill="rgba(255,240,200,0.06)"/>
    </svg>

    <!-- REC indicator -->
    <div class="rec-row">
      <div class="rec-dot" id="rec-dot"></div>
      <div class="mic-status" id="mic-status">tap to speak</div>
    </div>

    <!-- VU Meter -->
    <div class="vu-meter" id="vu-meter">
      <div class="vu-bar" style="height:3px"></div>
      <div class="vu-bar" style="height:5px"></div>
      <div class="vu-bar" style="height:4px"></div>
      <div class="vu-bar" style="height:7px"></div>
      <div class="vu-bar" style="height:4px"></div>
      <div class="vu-bar" style="height:6px"></div>
      <div class="vu-bar" style="height:3px"></div>
      <div class="vu-bar" style="height:5px"></div>
      <div class="vu-bar" style="height:4px"></div>
      <div class="vu-bar" style="height:7px"></div>
    </div>
  </div>
</div>

<!-- Bottom controls -->
<div class="controls" id="controls">
  <div class="ctrl-group">
    <button class="ctrl-btn" onclick="toggleMode()">
      <span id="mode-label">Free</span>
    </button>
    <button class="ctrl-btn" onclick="openDrawer('transcript')">Transcript</button>
  </div>
  <div class="ctrl-group">
    <span class="entry-count" id="entry-count"></span>
    <button class="ctrl-btn-primary" id="btn-generate" onclick="generateChapter()">Generate Chapter</button>
    <button class="ctrl-btn" onclick="exportMemoir()">Export</button>
    <button class="ctrl-btn" onclick="openDrawer('memoir')">The Memoir</button>
  </div>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closeAllDrawers()"></div>

<!-- Transcript Drawer -->
<div class="drawer" id="drawer-transcript">
  <div class="drawer-handle">
    <div class="drawer-title">Transcript & Voice Log</div>
    <button class="drawer-close" onclick="closeAllDrawers()">close ×</button>
  </div>
  <div class="drawer-body">
    <div class="transcript-text empty" id="transcript-live">Your words will appear here after you speak...</div>
    <div style="font-family:Inter,sans-serif;font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--dim);margin-bottom:14px;">Voice Log</div>
    <div class="voice-log" id="voice-log">
      <div style="font-family:Inter,sans-serif;font-size:13px;color:var(--dim);">Nothing yet. Start speaking.</div>
    </div>
  </div>
</div>

<!-- Memoir Drawer -->
<div class="drawer" id="drawer-memoir">
  <div class="drawer-handle">
    <div class="drawer-title">The Memoir</div>
    <button class="drawer-close" onclick="closeAllDrawers()">close ×</button>
  </div>
  <div class="drawer-body" id="chapters-wrap">
    <div class="empty-chapters">
      No chapters yet.<br><br>
      Speak some memories, then<br>
      <span>Generate Chapter</span> to weave them into your memoir.
    </div>
  </div>
</div>

<script>
  const HALLUCINATIONS = ['globalonenessproject', 'transcribed by', 'subtitles by', 'www.', 'http'];

  const PROMPTS = [
    "Tell me about where you grew up.",
    "What's a smell that takes you back somewhere?",
    "Who taught you something you still use today?",
    "Describe a moment you felt truly free.",
    "What would you want your grandchildren to know about you?",
    "Tell me about a time everything went wrong — and what happened next.",
    "What music defined a decade of your life?",
    "Tell me about the best meal you ever had.",
    "Who was your childhood best friend, and what did you do together?",
    "What's a piece of advice you were given that you almost ignored?",
    "Tell me about the place you've felt most at home.",
    "What was the hardest thing you ever had to let go of?",
    "What do you wish someone had told you when you were twenty?",
    "Describe a moment of pure luck that changed your direction.",
    "Tell me about someone who believed in you before you believed in yourself.",
    "What's something you made with your own hands that you're proud of?",
    "Tell me about a place that no longer exists — only in your memory.",
    "What tradition from your childhood do you still carry?",
    "Tell me about a risk you took that surprised you.",
    "Who in your family do you most see yourself in?"
  ];

  let promptIndex = 0;
  let guidedMode = false;

  function toggleMode() {
    guidedMode = !guidedMode;
    document.getElementById('mode-label').textContent = guidedMode ? 'Guided' : 'Free';
    document.querySelector('[onclick="toggleMode()"]').classList.toggle('active', guidedMode);
    const strip = document.getElementById('prompt-strip');
    if (guidedMode) {
      strip.classList.add('visible');
      showPrompt(promptIndex);
    } else {
      strip.classList.remove('visible');
    }
  }

  function showPrompt(i) {
    document.getElementById('prompt-text').textContent = PROMPTS[i % PROMPTS.length];
  }

  function nextPrompt() {
    promptIndex = (promptIndex + 1) % PROMPTS.length;
    showPrompt(promptIndex);
  }

  // ── Drawers ──────────────────────────────────────────────────────────────
  let activeDrawer = null;

  function openDrawer(name) {
    closeAllDrawers();
    const drawer = document.getElementById('drawer-' + name);
    if (!drawer) return;
    drawer.classList.add('open');
    document.getElementById('overlay').classList.add('visible');
    document.getElementById('controls').style.display = 'none';
    activeDrawer = name;
  }

  function closeAllDrawers() {
    document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open'));
    document.getElementById('overlay').classList.remove('visible');
    document.getElementById('controls').style.display = 'flex';
    activeDrawer = null;
  }

  // ── Built-in mic ─────────────────────────────────────────────────────────
  async function getBuiltInMicId() {
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const mics = devices.filter(d => d.kind === 'audioinput');
      const builtin = mics.find(d =>
        d.label.toLowerCase().includes('built-in') ||
        d.label.toLowerCase().includes('macbook')
      );
      return builtin ? { exact: builtin.deviceId } : undefined;
    } catch { return undefined; }
  }

  function isHallucination(text) {
    const lower = text.toLowerCase();
    return HALLUCINATIONS.some(h => lower.includes(h));
  }

  // ── Silence gate ─────────────────────────────────────────────────────────
  async function isSilent(blob) {
    try {
      const arrayBuffer = await blob.arrayBuffer();
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
      const channelData = audioBuffer.getChannelData(0);
      let sum = 0;
      for (let i = 0; i < channelData.length; i++) sum += Math.abs(channelData[i]);
      const avg = (sum / channelData.length) * 255;
      await audioCtx.close();
      return avg < 5;
    } catch { return false; }
  }

  // ── Ambient hum ──────────────────────────────────────────────────────────
  let humOsc = null, humCtx = null;
  function startHum() {
    try {
      humCtx = new (window.AudioContext || window.webkitAudioContext)();
      humOsc = humCtx.createOscillator();
      const g = humCtx.createGain();
      humOsc.frequency.value = 100;
      g.gain.value = 0.018;
      humOsc.connect(g);
      g.connect(humCtx.destination);
      humOsc.start();
    } catch {}
  }
  function stopHum() {
    try { if (humOsc) { humOsc.stop(); humOsc = null; } if (humCtx) { humCtx.close(); humCtx = null; } } catch {}
  }

  // ── VU Meter ─────────────────────────────────────────────────────────────
  let vuInterval = null;
  function startVU() {
    const bars = document.querySelectorAll('.vu-bar');
    bars.forEach(b => b.classList.add('active'));
    vuInterval = setInterval(() => {
      bars.forEach(b => { b.style.height = (Math.floor(Math.random() * 26) + 3) + 'px'; });
    }, 90);
  }
  function stopVU() {
    if (vuInterval) { clearInterval(vuInterval); vuInterval = null; }
    document.querySelectorAll('.vu-bar').forEach(b => { b.classList.remove('active'); b.style.height = '3px'; });
  }

  // ── Capsule glow animation ────────────────────────────────────────────────
  let glowInterval = null;
  function startGlow() {
    const glow = document.getElementById('capsule-glow');
    const dot  = document.getElementById('capsule-dot');
    const mglow = document.getElementById('mic-glow');
    mglow.classList.add('listening');
    let t = 0;
    glowInterval = setInterval(() => {
      t += 0.08;
      const v = 0.04 + Math.sin(t) * 0.03;
      glow.setAttribute('fill', `rgba(212,168,85,${v})`);
      dot.setAttribute('opacity', 0.3 + Math.sin(t) * 0.2);
    }, 50);
  }
  function stopGlow() {
    if (glowInterval) { clearInterval(glowInterval); glowInterval = null; }
    document.getElementById('capsule-glow').setAttribute('fill', 'rgba(212,168,85,0.05)');
    document.getElementById('capsule-dot').setAttribute('opacity', '0.25');
    document.getElementById('mic-glow').classList.remove('listening');
  }

  // ── Recording state ───────────────────────────────────────────────────────
  let isListening = false;
  let isProcessing = false;
  let mediaRecorder = null;
  let audioChunks = [];

  function handleMic() {
    if (activeDrawer) return; // don't record while drawer is open
    if (isProcessing) return;
    if (isListening) stopListening();
    else startListening();
  }

  async function startListening() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          sampleRate: 16000,
          deviceId: await getBuiltInMicId()
        }
      });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = processAudio;
      mediaRecorder.start();
      isListening = true;
      setUI('listening');
      startHum();
      startVU();
      startGlow();
    } catch {
      setStatus('mic access needed');
    }
  }

  function stopListening() {
    if (mediaRecorder && isListening) {
      mediaRecorder.stop();
      mediaRecorder.stream.getTracks().forEach(t => t.stop());
      isListening = false;
      setUI('processing');
      stopHum();
      stopVU();
      stopGlow();
    }
  }

  async function processAudio() {
    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    const silent = await isSilent(blob);
    if (silent) {
      setUI('idle');
      return;
    }
    const form = new FormData();
    form.append('audio', blob, 'memory.webm');
    try {
      const res = await fetch('/api/transcribe', { method: 'POST', body: form });
      const { text } = await res.json();
      if (text && text.trim() && !isHallucination(text)) {
        document.getElementById('transcript-live').textContent = text;
        document.getElementById('transcript-live').classList.remove('empty');
        await loadVoiceLog();
        await updateEntryCount();
      }
    } catch { setStatus('error — try again'); }
    setUI('idle');
  }

  // ── UI state ──────────────────────────────────────────────────────────────
  function setUI(state) {
    const mic = document.getElementById('vintage-mic');
    const rec = document.getElementById('rec-dot');
    isProcessing = false;

    mic.className = 'vintage-mic';
    rec.className = 'rec-dot';

    if (state === 'listening') {
      mic.classList.add('listening');
      rec.classList.add('visible');
      setStatus('recording');
      document.getElementById('mic-status').classList.add('listening');
    } else if (state === 'processing') {
      mic.classList.add('processing');
      isProcessing = true;
      setStatus('transcribing...');
    } else {
      setStatus('tap to speak');
    }
  }

  function setStatus(msg) {
    const el = document.getElementById('mic-status');
    el.textContent = msg;
    el.className = 'mic-status' + (msg === 'recording' ? ' listening' : '');
  }

  // ── Chapter generator ─────────────────────────────────────────────────────
  async function generateChapter() {
    const btn = document.getElementById('btn-generate');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>weaving...';
    try {
      const res = await fetch('/api/generate-chapter', { method: 'POST' });
      const data = await res.json();
      if (data.error) { alert(data.error); }
      else { await loadChapters(); openDrawer('memoir'); }
    } catch { alert('Generation failed. Check API key.'); }
    btn.disabled = false;
    btn.textContent = 'Generate Chapter';
  }

  // ── Export ────────────────────────────────────────────────────────────────
  async function exportMemoir() {
    try {
      const res = await fetch('/api/export');
      if (!res.ok) { const d = await res.json(); alert(d.error || 'No chapters yet.'); return; }
      const blob = await res.blob();
      const cd = res.headers.get('Content-Disposition') || '';
      const match = cd.match(/filename=(.+)/);
      const filename = match ? match[1] : 'memoir.txt';
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    } catch { alert('Export failed.'); }
  }

  // ── Data loaders ──────────────────────────────────────────────────────────
  async function loadVoiceLog() {
    const res = await fetch('/api/voice-log');
    const entries = await res.json();
    const el = document.getElementById('voice-log');
    if (!entries.length) return;
    el.innerHTML = entries.map(e => {
      const d = new Date(e.timestamp);
      const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      const timeStr = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      return `<div class="log-entry">
        <div class="log-time">${dateStr} · ${timeStr}</div>
        <div class="log-text">${escHtml(e.text)}</div>
      </div>`;
    }).join('');
  }

  async function loadChapters() {
    const res = await fetch('/api/chapters');
    const chapterList = await res.json();
    const wrap = document.getElementById('chapters-wrap');
    if (!chapterList.length) return;
    wrap.innerHTML = chapterList.map(c => `
      <div class="memoir-chapter">
        <div class="chapter-header">${escHtml(c.name.replace(/_/g, ' '))}</div>
        <div class="chapter-body">${escHtml(c.content)}</div>
      </div>
    `).join('');
  }

  async function updateEntryCount() {
    const res = await fetch('/api/voice-log');
    const entries = await res.json();
    const el = document.getElementById('entry-count');
    el.textContent = entries.length > 0 ? `${entries.length} entr${entries.length === 1 ? 'y' : 'ies'}` : '';
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Smoke particles ───────────────────────────────────────────────────────
  function spawnSmoke() {
    const layer = document.getElementById('smoke-layer');
    const p = document.createElement('div');
    p.className = 'smoke-particle';
    const size = 80 + Math.random() * 160;
    const left = 30 + Math.random() * 40; // center-ish
    const duration = 18 + Math.random() * 22;
    const drift = (Math.random() - 0.5) * 120;
    const delay = Math.random() * -20;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${left}%;
      --drift:${drift}px;
      animation-duration:${duration}s;
      animation-delay:${delay}s;
    `;
    layer.appendChild(p);
    // remove and respawn after one cycle
    setTimeout(() => { p.remove(); spawnSmoke(); }, (duration + Math.abs(delay)) * 1000);
  }
  // Start a few smoke particles staggered
  for (let i = 0; i < 6; i++) spawnSmoke();

  // ── Init ──────────────────────────────────────────────────────────────────
  loadVoiceLog();
  loadChapters();
  updateEntryCount();
</script>
</body>
</html>
